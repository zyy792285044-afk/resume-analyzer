<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API测试诊断</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1a1a1a;
            color: #00ff00;
        }
        .log {
            background: #000;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #333;
            max-height: 400px;
            overflow-y: auto;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #00ff00;
            color: #000;
            border: none;
            cursor: pointer;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #000;
            color: #00ff00;
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <h1>🔍 API测试诊断</h1>
    
    <div>
        <label>API地址:</label>
        <input id="apiUrl" value="https://4925fcc2-b204-42d1-b939-4f2b318b1d14.dev.coze.site/stream_run">
    </div>
    
    <div>
        <label>测试消息:</label>
        <input id="testMessage" value="你好，请分析这份简历：张三，前端开发，3年经验">
    </div>
    
    <button onclick="testAPI()">🚀 测试API</button>
    <button onclick="testSimpleAPI()">🧪 测试简单请求</button>
    <button onclick="clearLog()">🗑️ 清空日志</button>
    
    <h2>📋 请求日志</h2>
    <div id="requestLog" class="log"></div>
    
    <h2>📥 响应日志</h2>
    <div id="responseLog" class="log"></div>
    
    <h2>📊 原始数据</h2>
    <div id="rawLog" class="log"></div>

    <script>
        function log(element, message) {
            const div = document.getElementById(element);
            div.innerHTML += `<div>${new Date().toLocaleTimeString()} - ${message}</div>`;
            div.scrollTop = div.scrollHeight;
        }
        
        function clearLog() {
            document.getElementById('requestLog').innerHTML = '';
            document.getElementById('responseLog').innerHTML = '';
            document.getElementById('rawLog').innerHTML = '';
        }
        
        async function testSimpleAPI() {
            const apiUrl = document.getElementById('apiUrl').value;
            
            try {
                log('requestLog', `GET请求: ${apiUrl}`);
                
                const response = await fetch(apiUrl, {
                    method: 'GET'
                });
                
                log('responseLog', `状态码: ${response.status}`);
                log('responseLog', `状态文本: ${response.statusText}`);
                log('responseLog', `Headers: ${JSON.stringify([...response.headers])}`);
                
                const text = await response.text();
                log('rawLog', `响应内容: ${text.substring(0, 500)}`);
                
            } catch (error) {
                log('responseLog', `❌ 错误: ${error.message}`);
            }
        }
        
        async function testAPI() {
            const apiUrl = document.getElementById('apiUrl').value;
            const message = document.getElementById('testMessage').value;
            
            const requestBody = {
                type: "query",
                session_id: 'test_' + Date.now(),
                content: {
                    query: {
                        prompt: [
                            {
                                type: "text",
                                content: {
                                    text: message
                                }
                            }
                        ]
                    }
                }
            };
            
            log('requestLog', `POST请求: ${apiUrl}`);
            log('requestLog', `请求体: ${JSON.stringify(requestBody, null, 2)}`);
            
            try {
                const startTime = Date.now();
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(requestBody)
                });
                
                const elapsed = Date.now() - startTime;
                log('responseLog', `⏱️ 响应时间: ${elapsed}ms`);
                log('responseLog', `状态码: ${response.status}`);
                log('responseLog', `状态文本: ${response.statusText}`);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    log('responseLog', `❌ 错误响应: ${errorText}`);
                    return;
                }
                
                // 读取流式响应
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let totalChunks = 0;
                let allText = '';
                
                log('responseLog', '📥 开始接收流式数据...');
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) {
                        log('responseLog', '✅ 流式传输完成');
                        break;
                    }
                    
                    totalChunks++;
                    const chunk = decoder.decode(value, { stream: true });
                    allText += chunk;
                    
                    log('rawLog', `块 ${totalChunks}: ${chunk.substring(0, 200)}...`);
                    
                    // 尝试解析每一行
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                log('responseLog', `📦 数据类型: ${data.type}`);
                                
                                if (data.content) {
                                    let textContent = '';
                                    if (typeof data.content === 'string') {
                                        textContent = data.content;
                                    } else if (data.content.text) {
                                        textContent = data.content.text;
                                    }
                                    
                                    if (textContent) {
                                        log('responseLog', `📝 内容: ${textContent.substring(0, 100)}...`);
                                    }
                                }
                            } catch (e) {
                                log('responseLog', `⚠️ 解析错误: ${e.message}`);
                            }
                        }
                    }
                }
                
                log('responseLog', `📊 总共接收 ${totalChunks} 个数据块`);
                log('responseLog', `📏 总数据大小: ${allText.length} 字符`);
                
            } catch (error) {
                log('responseLog', `❌ 请求失败: ${error.message}`);
                log('responseLog', `堆栈: ${error.stack}`);
            }
        }
    </script>
</body>
</html>
