<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>简历战斗力分析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .content {
            padding: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .form-group textarea {
            width: 100%;
            min-height: 200px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
            resize: vertical;
            transition: border-color 0.3s;
        }
        
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .format-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .format-option {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .format-option.active {
            border-color: #667eea;
            background: #f0f3ff;
        }
        
        .format-option-icon {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .format-option-text {
            font-size: 12px;
            color: #666;
        }
        
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .result-container {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }
        
        .result-container.show {
            display: block;
        }
        
        .result-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }
        
        .result-content {
            font-size: 14px;
            line-height: 1.8;
            color: #333;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .result-content h2 {
            font-size: 18px;
            margin: 20px 0 10px 0;
        }
        
        .result-content h3 {
            font-size: 16px;
            margin: 15px 0 8px 0;
        }
        
        .result-content ul, .result-content ol {
            padding-left: 20px;
            margin: 10px 0;
        }
        
        .result-content li {
            margin: 5px 0;
        }
        
        .result-content strong {
            color: #667eea;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }
        
        .loading.show {
            display: block;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .download-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .download-link:hover {
            background: #5568d3;
        }
        
        .tips {
            background: #fff9e6;
            border-left: 4px solid #ffc107;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        
        .tips-title {
            font-size: 14px;
            font-weight: 600;
            color: #856404;
            margin-bottom: 5px;
        }
        
        .tips-text {
            font-size: 12px;
            color: #856404;
            line-height: 1.6;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>简历战斗力分析</h1>
            <p>专业简历评估 · 精准问题诊断 · 优化建议</p>
        </div>
        
        <div class="content">
            <div class="tips">
                <div class="tips-title">💡 使用提示</div>
                <div class="tips-text">
                    • 请粘贴完整简历内容，包括个人信息、工作经历、教育背景、技能等<br>
                    • 支持选择文本、PDF、Word三种输出格式<br>
                    • 分析时间约10-30秒，请耐心等待
                </div>
            </div>
            
            <div class="form-group">
                <label>📝 粘贴您的简历内容</label>
                <textarea id="resumeInput" placeholder="请将简历内容粘贴到这里...

示例格式：
张三
产品经理 | 5年经验

工作经历：
2020-2023 ABC公司 产品经理
负责电商平台产品设计...

教育背景：
2014-2018 某大学 计算机专业 本科

技能：
- 产品设计
- 数据分析"></textarea>
            </div>
            
            <div class="form-group">
                <label>📄 选择输出格式</label>
                <div class="format-selector">
                    <div class="format-option active" data-format="text" onclick="selectFormat('text')">
                        <div class="format-option-icon">📝</div>
                        <div class="format-option-text">文本格式</div>
                    </div>
                    <div class="format-option" data-format="pdf" onclick="selectFormat('pdf')">
                        <div class="format-option-icon">📥</div>
                        <div class="format-option-text">PDF下载</div>
                    </div>
                    <div class="format-option" data-format="word" onclick="selectFormat('word')">
                        <div class="format-option-icon">📄</div>
                        <div class="format-option-text">Word下载</div>
                    </div>
                </div>
            </div>
            
            <button class="submit-btn" id="submitBtn" onclick="analyzeResume()">
                开始分析
            </button>
            
            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <p style="margin-top: 15px; color: #666;">正在分析中，请稍候...</p>
            </div>
            
            <div class="error-message" id="errorMessage"></div>
            
            <div class="result-container" id="resultContainer">
                <div class="result-title">📊 分析报告</div>
                <div class="result-content" id="resultContent"></div>
                <div id="downloadSection"></div>
            </div>
        </div>
        
        <div class="footer">
            Powered by AI智能体 · 仅供学习参考
        </div>
    </div>
    
    <script>
        let selectedFormat = 'text';
        
        // API地址 - 请替换为您的实际API地址
        const API_URL = 'https://2m6zxztjxq.coze.site/stream_run';
        
        function selectFormat(format) {
            selectedFormat = format;
            document.querySelectorAll('.format-option').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelector(`[data-format="${format}"]`).classList.add('active');
        }
        
        async function analyzeResume() {
            const resumeInput = document.getElementById('resumeInput').value.trim();
            
            if (!resumeInput) {
                showError('请输入简历内容');
                return;
            }
            
            // 显示加载状态
            document.getElementById('loading').classList.add('show');
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('resultContainer').classList.remove('show');
            document.getElementById('errorMessage').classList.remove('show');
            
            try {
                // 构建请求消息
                let userMessage = `请分析我的简历。\n\n${resumeInput}`;
                if (selectedFormat === 'pdf') {
                    userMessage += '\n\n请输出PDF格式的报告。';
                } else if (selectedFormat === 'word') {
                    userMessage += '\n\n请输出Word格式的报告。';
                }
                
                // 调用API
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        messages: [
                            {
                                role: 'user',
                                content: userMessage
                            }
                        ]
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`API请求失败: ${response.status}`);
                }
                
                // 处理流式响应
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let result = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                
                                // 提取文本内容
                                if (data.content) {
                                    result += data.content;
                                } else if (data.message && data.message.content) {
                                    result += data.message.content;
                                }
                            } catch (e) {
                                // 忽略解析错误
                            }
                        }
                    }
                }
                
                // 显示结果
                document.getElementById('resultContent').textContent = result || '分析完成，但未获取到结果';
                document.getElementById('resultContainer').classList.add('show');
                
                // 处理下载链接
                if (selectedFormat !== 'text') {
                    const downloadSection = document.getElementById('downloadSection');
                    const linkMatch = result.match(/下载链接：(https?:\/\/[^\s]+)/);
                    if (linkMatch) {
                        downloadSection.innerHTML = `<a href="${linkMatch[1]}" target="_blank" class="download-link">📥 点击下载报告</a>`;
                    }
                }
                
            } catch (error) {
                console.error('Error:', error);
                showError(`分析失败: ${error.message}`);
            } finally {
                document.getElementById('loading').classList.remove('show');
                document.getElementById('submitBtn').disabled = false;
            }
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }
    </script>
</body>
</html>
